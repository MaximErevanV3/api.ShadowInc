<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAM Console — ShadowsLTD</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #050508;
            background-image: 
                radial-gradient(at 50% 0%, rgba(34, 197, 94, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(24, 24, 37, 0.6) 0px, transparent 50%);
            color: #f4f4f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box;
        }
        .auth-card {
            background: rgba(10, 10, 14, 0.85); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px; padding: 40px; max-width: 420px; width: 100%; margin: 20px; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px);
        }
        .back-link { font-size: 13px; color: #5c5c64; text-decoration: none; display: inline-block; margin-bottom: 25px; transition: color 0.2s; }
        .back-link:hover { color: #ffffff; }
        
        h1 { font-size: 24px; font-weight: 700; color: #ffffff; margin: 0 0 8px 0; letter-spacing: -0.02em; text-align: left; }
        .desc { font-size: 13px; color: #6e6d7a; line-height: 1.5; margin-bottom: 25px; text-align: left; }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-label { display: block; font-size: 11px; color: #52525b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; font-weight: 600; }
        .form-input { width: 100%; padding: 12px 16px; background: #010103; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; color: #ffffff; font-size: 14px; font-family: monospace; box-sizing: border-box; }
        .form-input:focus { border-color: #4ade80; outline: none; background: #050508; }
        
        .btn-submit { width: 100%; padding: 14px; background: #ffffff; color: #050508; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-submit:hover { background: #e4e4e7; }

        .notification {
            display: none; padding: 14px; border-radius: 10px; font-size: 13px; line-height: 1.5; margin-top: 15px; text-align: left;
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div style="text-align: left;">
            <a href="index.html" class="back-link">← На главную</a>
        </div>
        
        <h1>IAM Авторизация</h1>
        <p class="desc">Вход в закрытый узел терминала управления ShadowsLTD.</p>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">UID Оператора</label>
                <input type="text" id="l-uid" class="form-input" placeholder="Введите UID" required>
            </div>
            <div class="form-group">
                <label class="form-label">Криптографический ключ</label>
                <input type="password" id="l-pass" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Выполнить Handshake</button>
        </form>
        <div id="login-notification" class="notification"></div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const uidInput = document.getElementById('l-uid').value;
            const passInput = document.getElementById('l-pass').value;
            const notify = document.getElementById('login-notification');

            // Проверка секретных данных
            if (uidInput === "Admin" && passInput === "1234") {
                notify.style.display = 'none';
                localStorage.setItem('session_username', uidInput);
                window.location.href = 'dashboard.html';
            } else {
                notify.style.display = 'block';
                notify.innerText = "Ошибка безопасности: Учетные данные не найдены. Попытка неавторизованного доступа зафиксирована сетевыми демонами кластера.";
            }
        }
    </script>
</body>
</html>
