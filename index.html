<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowsLTD — Инфраструктурная платформа</title>
    <style>
        /* Премиальная темная тема с сеткой и градиентным свечением */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #030307;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                radial-gradient(at 50% 0%, rgba(34, 197, 94, 0.05) 0px, transparent 50%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
            color: #f4f4f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box;
        }

        /* Карточка с эффектом размытия и мягкой внешней тенью */
        .main-card {
            background: rgba(8, 8, 12, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 45px 40px;
            max-width: 540px;
            width: 100%;
            margin: 40px 20px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            position: relative;
            transition: border-color 0.5s ease;
        }

        .main-card:hover {
            border-color: rgba(34, 197, 94, 0.15);
        }

        /* Линейный декоративный элемент сверху карточки */
        .main-card::before {
            content: ''; position: absolute; top: -1px; left: 15%; right: 15%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.25), transparent);
        }

        /* Компактный двойной бейдж статуса и версии */
        .badge-container {
            display: flex; gap: 8px; margin-bottom: 24px; justify-content: center;
        }

        .badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
            background: rgba(34, 197, 94, 0.06); border: 1px solid rgba(34, 197, 94, 0.15);
            color: #4ade80; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.03em;
        }

        .badge-version {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            color: #a1a1aa;
        }

        .pulse-dot {
            width: 6px; height: 6px; background-color: #22c55e; border-radius: 50%; position: relative;
        }

        .pulse-dot::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
            background-color: #22c55e; animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        /* Заголовок со сложным неоново-зеленым градиентом */
        h1 {
            font-size: 38px; font-weight: 700; letter-spacing: -0.04em; margin: 0 0 14px 0;
            background: linear-gradient(135deg, #ffffff 40%, #4ade80 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .subtitle { font-size: 14px; color: #8a8993; line-height: 1.6; margin: 0 0 30px 0; text-align: center; }
        
        /* Сетка метрик */
        .metrics-bar {
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px; padding: 14px 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
        }
        .metric-item { text-align: left; }
        .metric-label { font-size: 11px; color: #52525b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .ticker-window { height: 16px; overflow: hidden; font-size: 14px; font-weight: 600; font-family: monospace; }
        .ticker-stack { display: flex; flex-direction: column; }
        .ping-ticker { animation: tickPing 12s steps(1) infinite; }
        .uptime-ticker { animation: tickUptime 19s steps(1) infinite; }
        .ticker-stack span { height: 16px; line-height: 16px; color: #e4e4e7; }
        
        @keyframes tickPing {
            0%, 100% { transform: translateY(0); }
            16.6% { transform: translateY(-16px); }
            33.3% { transform: translateY(-32px); }
            50%   { transform: translateY(-48px); }
            66.6% { transform: translateY(-64px); }
            83.3% { transform: translateY(-80px); }
        }
        @keyframes tickUptime {
            0%, 100% { transform: translateY(0); }
            25%   { transform: translateY(-16px); }
            50%   { transform: translateY(-32px); }
            75%   { transform: translateY(-48px); }
        }
        
        /* Кнопка скачивания ядра (ЗАБЛОКИРОВАННАЯ) */
        .download-box {
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px; padding: 22px; margin-bottom: 25px; text-align: left;
        }
        .download-title { font-size: 11px; font-weight: 600; color: #52525b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
        .os-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .os-tab-btn { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.04); color: #52525b; font-size: 12px; padding: 7px 14px; border-radius: 8px; cursor: pointer; }
        .os-tab-btn.active { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08); color: #a1a1aa; }

        .btn-disabled {
            width: 100%; padding: 14px; font-size: 14px; font-weight: 600; border-radius: 12px; box-sizing: border-box; cursor: pointer;
            background: rgba(255, 255, 255, 0.02); color: #52525b; border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex; justify-content: center; align-items: center; transition: all 0.2s ease;
        }
        .btn-disabled:hover { background: rgba(255, 255, 255, 0.04); color: #71717a; }

        /* Всплывающее предупреждение */
        .alert-toast {
            display: none; padding: 12px 16px; background: rgba(251, 191, 36, 0.06); border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 10px; color: #fbbf24; font-size: 12px; line-height: 1.5; margin-top: 12px; text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .tech-info-block { text-align: left; border-top: 1px solid rgba(255, 255, 255, 0.03); padding-top: 20px; }
        .tech-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #52525b; letter-spacing: 0.05em; margin-bottom: 8px; margin-top: 18px; }
        .tech-title:first-child { margin-top: 0; }
        .tech-text { font-size: 13px; color: #6e6d7a; line-height: 1.6; margin: 0 0 12px 0; }
        
        /* Блок О нас */
        .about-block {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out;
            background: rgba(255, 255, 255, 0.01); border-radius: 14px; margin-top: 5px; text-align: left;
        }
        .about-block.open { max-height: 200px; padding: 16px; border: 1px solid rgba(255, 255, 255, 0.03); margin-bottom: 15px; }
        
        /* Кнопки переходов */
        .btn-stack { margin-top: 5px; display: flex; flex-direction: column; gap: 12px; }
        .btn-sub { 
            display: flex; justify-content: center; align-items: center; padding: 14px; font-size: 14px; font-weight: 600; text-decoration: none; border-radius: 12px; box-sizing: border-box; cursor: pointer;
            background: rgba(255, 255, 255, 0.02); color: #f4f4f6; border: 1px solid rgba(255, 255, 255, 0.06); transition: all 0.2s ease;
        }
        .btn-sub:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.12); transform: translateY(-1px); }

        .footer { font-size: 11px; color: #3f3f46; border-top: 1px solid rgba(255, 255, 255, 0.03); padding-top: 20px; margin-top: 30px; text-align: center; }
    </style>
</head>
