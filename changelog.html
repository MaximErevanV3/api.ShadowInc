<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История изменений — ShadowsLTD</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #030307;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                radial-gradient(at 50% 0%, rgba(34, 197, 94, 0.05) 0px, transparent 50%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
            color: #f4f4f6; margin: 0; padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box;
            transition: padding-top 0.3s ease;
        }
        .changelog-card {
            background: rgba(8, 8, 12, 0.85); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 28px;
            padding: 45px 40px; max-width: 540px; width: 100%; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); position: relative;
        }
        .back-link { font-size: 13px; color: #52525b; text-decoration: none; display: inline-block; margin-bottom: 25px; transition: color 0.2s; }
        .back-link:hover { color: #ffffff; }
        h1 { font-size: 28px; font-weight: 700; color: #ffffff; margin: 0 0 8px 0; letter-spacing: -0.02em; }
        .subtitle { font-size: 14px; color: #71717a; margin-bottom: 35px; }
        
        /* Стили таймлайна версий */
        .version-block { border-left: 2px solid rgba(255, 255, 255, 0.05); padding-left: 20px; margin-bottom: 30px; position: relative; text-align: left; }
        .version-block::before { content: ''; position: absolute; left: -6px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: #52525b; border: 2px solid #030307; }
        .version-block.latest::before { background: #4ade80; box-shadow: 0 0 10px #22c55e; }
        
        .version-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .version-title { font-size: 16px; font-weight: 700; color: #ffffff; font-family: monospace; }
        .version-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 100px; }
        .badge-blue { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.2); }
        .badge-gray { background: rgba(255, 255, 255, 0.03); color: #71717a; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        .change-list { list-style: none; padding: 0; margin: 0; font-size: 13px; color: #acacb6; line-height: 1.6; }
        .change-item { margin-bottom: 6px; position: relative; padding-left: 15px; }
        .change-item::before { content: '•'; position: absolute; left: 0; color: #52525b; }
        .change-item.add::before { color: #4ade80; }
        .change-item.fix::before { color: #f87171; }
        
        .footer { font-size: 11px; color: #3f3f46; border-top: 1px solid rgba(255, 255, 255, 0.03); padding-top: 20px; margin-top: 40px; text-align: center; }
    </style>
</head>
